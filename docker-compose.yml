name: "selenoid"

services:
  selenoid:
    image: aerokube/selenoid:1.11.3
    container_name: selenoid
    ports:
      - "4444:4444"
    volumes:
      # Конфигурация браузеров
      - "./config:/etc/selenoid"
      # Доступ к Docker daemon, чтобы Selenoid поднимал контейнеры с браузерами
      - "//var/run/docker.sock:/var/run/docker.sock"
      # Каталоги для видео и логов
      - "./config/video:/opt/selenoid/video"
      - "./config/logs:/opt/selenoid/logs"
    environment:
      - OVERRIDE_VIDEO_OUTPUT_DIR=${PWD}/config/video
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-video-output-dir"
      - "/opt/selenoid/video"
      - "-log-output-dir"
      - "/opt/selenoid/logs"
      - "-container-network"
      - "selenoid_default"
    restart: unless-stopped

  selenoid-ui:
    image: aerokube/selenoid-ui:1.10.11
    container_name: selenoid-ui
    depends_on:
      - selenoid
    ports:
      - "8080:8080"
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"
    restart: unless-stopped
